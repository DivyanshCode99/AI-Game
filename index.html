<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POSE RUNNER</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.1/dist/posenet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.6/dist/teachablemachine-pose.min.js"></script>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

<div class="layout">
  <div class="game-wrap">
    <canvas id="game" width="400" height="600"></canvas>
    <div id="hitFlash"></div>
    <button id="startBtn"    class="game-btn">START</button>
    <button id="playAgainBtn" class="game-btn">PLAY AGAIN</button>
    <div id="credits">Dhruv Narang &amp; Divyansh Narang</div>
  </div>

  <div class="side">
    <div id="webcamContainer"></div>

    <div class="pbox">
      <div class="pbox-title">Model</div>
      <input id="modelUrlInput" type="text" placeholder="Teachable Machine URL" />
      <button id="loadModelBtn">LOAD</button>
    </div>

    <div class="pbox">
      <div id="predictionLabel">Detection: —</div>
      <div id="predictionBars"></div>
      <div id="detectionHint">Load a model and allow camera access.</div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
